<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Mensagem no email</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            width: 80%;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
        .header {
            text-align: center;
            color: #333;
        }
        .content {
            margin: 20px 0;
        }
        .footer {
            text-align: center;
            color: #555;
        }
        .important {
            font-weight: bold;
            color: #d9534f;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Nova Mensagem</h1>
    </div>
    <div class="content">
        <p>Destinatário:
            <span class="important" th:text="${nomeDestinatario}">Nome do destinatário</span></p>
        <p>Data e hora da mensagem:
            <span class="important" th:text="${dataHoraEnvio}">Horário</span>.</p>
        <p>Contato:
            <span class="important" th:text="${telefoneDestinatario}">Telefone</span>
        </p>
        <p>Confira sua mensagem:
            <span th:text="${mensagem}">mensagem</span>
        </p>

    </div>
    <div class="footer">
        <p>Obrigado por usar nossos serviços.</p>
    </div>
</div>
</body>
</html>
